services:
  postgres:
    image: postgres:16-alpine
    container_name: resol-backend-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "timezone=UTC"]
    environment:
      POSTGRES_DB: resol_backend
      POSTGRES_USER: resol
      POSTGRES_PASSWORD: resol
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resol -d resol_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: resol-backend-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
